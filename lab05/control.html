<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemell Digital G11C — Sala de control</title>
  <style>
    :root { --gutter: 8px; --minPane: 220px; }
    html, body { height: 100%; margin: 0; background: #0a0f0d; }
    .split {
      height: 100vh;
      display: grid;
      grid-template-columns: 62% var(--gutter) auto;
      overflow: hidden;
      user-select: none;
    }
    .pane { overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; }
    .divider {
      cursor: col-resize;
      background: #111916;
      position: relative;
      touch-action: none;
    }
    .divider::after {
      content: "";
      position: absolute; left: 50%; top: 0;
      transform: translateX(-50%);
      width: 2px; height: 100%;
      background: #00e5a0; opacity: .5;
    }
    .dragging { cursor: col-resize; }
    .dragging iframe { pointer-events: none; }
  </style>
</head>
<body>
  <div class="split" id="split">
    <div class="pane">
      <!-- Snap! carrega el projecte automaticament via #open: (com fa el
           professor amb el seu mm2.xml). GitHub Pages serveix el XML amb
           CORS obert. Si s'obre control.html en local, Snap! no podra
           recuperar el fitxer: en aquest cas File -> Import manual. -->
      <iframe id="snap-frame" allow="clipboard-read; clipboard-write"></iframe>
    </div>
    <div class="divider" id="divider" aria-label="Separador"></div>
    <div class="pane">
      <iframe src="dashboard.html?mqtt=auto"></iframe>
    </div>
  </div>

  <script>
    // Si la pagina esta servida per https (GitHub Pages), Snap! pot carregar
    // el projecte directament via #open:<url del xml en aquest mateix lloc>.
    // En local (file:// o http://localhost) snap.berkeley.edu no pot recuperar
    // el fitxer (contingut mixt), aixi que es carrega Snap! buit i es fa
    // File -> Import manualment.
    const snapFrame = document.getElementById('snap-frame');
    const SNAP = 'https://snap.berkeley.edu/snap/snap.html';
    if (location.protocol === 'https:') {
      const xmlUrl = new URL('SIM_LAB05_G11C.xml', location.href).href;
      snapFrame.src = `${SNAP}#open:${xmlUrl}`;
    } else {
      snapFrame.src = SNAP;
    }

    const split = document.getElementById('split');
    const divider = document.getElementById('divider');
    const gutter = 8, minPane = 220;
    let dragging = false;

    function setColumns(clientX) {
      const rect = split.getBoundingClientRect();
      let x = Math.max(minPane, Math.min(rect.width - minPane - gutter, clientX - rect.left));
      split.style.gridTemplateColumns = `${x}px ${gutter}px auto`;
    }
    function onDown(e) {
      dragging = true;
      document.body.classList.add('dragging');
      setColumns((e.touches ? e.touches[0] : e).clientX);
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      setColumns((e.touches ? e.touches[0] : e).clientX);
      e.preventDefault();
    }
    function onUp() { dragging = false; document.body.classList.remove('dragging'); }

    divider.addEventListener('mousedown', onDown);
    divider.addEventListener('touchstart', onDown, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);
  </script>
</body>
</html>
